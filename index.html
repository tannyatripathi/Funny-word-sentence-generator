<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Funny Sentence Generator</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 100px;
      background: #f5f5f5;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
    #output {
      margin-top: 30px;
      font-size: 20px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<h2>😂 Funny Sentence Generator</h2>

<button onclick="generate()">Generate</button>

<div id="output"></div>

<script>
const subjects = ["dog", "banana", "grandma", "robot", "alien"];
const verbs = ["eats", "destroys", "licks", "throws", "dances with"];
const objects = ["pizza", "phone", "car", "teacher", "shoe"];

function generate() {
  let s = subjects[Math.floor(Math.random()*subjects.length)];
  let v = verbs[Math.floor(Math.random()*verbs.length)];
  let o = objects[Math.floor(Math.random()*objects.length)];

  document.getElementById("output").innerText = 
    `The ${s} ${v} the ${o}! 😂`;
}
</script>

</body>
</html>
